<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coeurs de la paroisse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #faf6f1;
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.8rem 0.3rem;
      max-width: 980px;
      margin: 0 auto;
      justify-items: center;
      padding: 1rem 0;
    }

    /* --- Heart card (flip container) --- */
    .heart-card {
      width: 180px;
      height: 168px;
      perspective: 800px;
      cursor: pointer;
    }

    .heart-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s ease;
      transform-style: preserve-3d;
    }

    .heart-card.flipped .heart-inner {
      transform: rotateY(180deg);
    }

    .heart-front,
    .heart-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart-back {
      transform: rotateY(180deg);
    }

    /* --- Heart SVG --- */
    .heart-svg {
      width: 165px;
      height: 149px;
      transition: transform 0.25s ease, filter 0.25s ease;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.1));
    }

    .heart-card:hover .heart-svg {
      transform: scale(1.1);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
    }

    /* --- Back heart with message --- */
    .heart-back-wrap {
      position: relative;
      width: 180px;
      height: 162px;
    }

    .heart-back-wrap .heart-svg {
      width: 180px;
      height: 162px;
    }

    .heart-back-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 22px 30px;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      word-break: break-word;
    }

    /* --- Zoom mode --- */
    .heart-card.zoomed {
      z-index: 50;
    }

    .heart-card.zoomed .heart-inner {
      transform: rotateY(180deg) scale(2.5);
    }

    /* --- Pulse animation for random --- */
    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    .heart-card.pulse .heart-svg {
      animation: pulse 0.4s ease 2;
    }

    /* --- Button group --- */
    .btn-group {
      position: sticky;
      bottom: 12rem;
      width: fit-content;
      margin: 1.5rem auto 0;
      z-index: 100;
    }

    /* --- Main pill: "Au hasard" (always centered) --- */
    .random-btn {
      background: #fff;
      color: #d4556a;
      border: 3px solid #d4556a;
      border-radius: 50px;
      padding: 1rem 2rem;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      position: relative;
      z-index: 2;
    }

    .random-btn:hover {
      background: #fce8ec;
    }

    /* --- Zoom sliding pill (behind Au hasard, peeks right) --- */
    .zoom-slide {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      background: #fff;
      border: 3px solid #d4556a;
      border-radius: 50px;
      z-index: 1;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      cursor: pointer;
      transition: left 0.35s ease, background 0.3s, border-color 0.3s;
      /* Collapsed: mostly behind Au hasard */
      left: calc(100% - 1.6rem);
    }

    /* Slid out */
    .zoom-slide.open {
      left: calc(100% - 1rem);
    }

    /* Active (zoom on): fill entire pill */
    .zoom-slide.active {
      background: #d4556a;
      border-color: #d4556a;
    }

    .zoom-slide.active .zoom-label,
    .zoom-slide.active .zoom-chevron {
      color: #fff;
    }

    /* --- Zoom text label (hidden when collapsed) --- */
    .zoom-label {
      color: #d4556a;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      padding: 0.8rem 0;
      transition: max-width 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
    }

    .zoom-slide.open .zoom-label {
      max-width: 120px;
      opacity: 1;
      padding: 0.8rem 0.4rem 0.8rem 1.8rem;
    }

    /* --- Chevron (always visible, changes direction) --- */
    .zoom-chevron {
      color: #d4556a;
      font-size: 3.8rem;
      font-weight: 500;
      line-height: 1;
      padding: 0rem 0rem 0.5rem 1.2rem;
      transition: color 0.2s, padding 0.35s ease;
      flex-shrink: 0;
    }

    .zoom-slide.open .zoom-chevron {
      padding: 0rem 0.5rem 0.5rem 0rem;
    }

    /* --- Responsive --- */
    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 760px;
      }
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 560px;
        gap: 0.5rem 0.2rem;
      }

      .heart-card {
        width: 155px;
        height: 145px;
      }

      .heart-svg {
        width: 140px;
        height: 126px;
      }

      .heart-back-wrap {
        width: 155px;
        height: 140px;
      }

      .heart-back-wrap .heart-svg {
        width: 155px;
        height: 140px;
      }

      .heart-back-text {
        font-size: 12px;
        padding: 18px 20px 28px;
      }

      body {
        padding: 1rem 0.5rem 5rem;
      }
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        max-width: 340px;
      }
    }
  </style>
</head>

<body>

  <div class="grid" id="grid"></div>
  <div class="btn-group" id="btnGroup">
    <button class="random-btn" id="randomBtn">Au hasard</button>
    <div class="zoom-slide" id="zoomSlide">
      <span class="zoom-label">Zoom</span>
      <span class="zoom-chevron" id="zoomChevron">&rsaquo;</span>
    </div>
  </div>

  <script>
    const messages = [
      "Merci pour l'accueil chaleureux chaque dimanche",
      "Merci à la chorale pour la beauté des chants",
      "Merci pour les moments de partage et de fraternité",
      "Merci au père pour ses homélies qui touchent le cœur",
      "Merci aux catéchistes qui transmettent la foi à nos enfants",
      "Merci pour les repas paroissiaux qui nous rassemblent",
      "Merci à ceux qui fleurissent l'église avec tant de soin",
      "Merci pour la prière des uns pour les autres",
      "Merci aux bénévoles du secrétariat, toujours disponibles",
      "Merci pour les visites aux personnes malades et isolées",
      "Merci pour cette communauté qui est comme une famille",
      "Merci pour l'écoute et le soutien dans les moments difficiles",
      "Merci aux servants d'autel pour leur service joyeux",
      "Merci pour les groupes de prière qui nourrissent notre foi",
      "Merci à l'équipe liturgique pour la beauté des célébrations",
      "Merci pour la kermesse et tous les moments de joie partagée",
      "Merci pour le café après la messe, ces petits moments comptent",
      "Merci d'avoir accompagné notre famille dans le deuil",
      "Merci pour la préparation au baptême de notre enfant",
      "Merci aux sacristains qui préparent tout dans l'ombre",
      "Merci pour le pèlerinage, une expérience inoubliable",
      "Merci pour l'aide aux plus démunis de notre quartier",
      "Merci à l'équipe d'accueil pour leur sourire chaque dimanche",
      "Merci pour les retraites qui nous permettent de nous ressourcer",
      "Merci pour la bienveillance que je trouve ici",
      "Merci d'avoir préparé notre mariage avec tant d'attention",
      "Merci aux lecteurs qui donnent vie à la Parole",
      "Merci pour le groupe de jeunes, nos ados sont transformés",
      "Merci pour les veillées de Noël, des souvenirs précieux",
      "Merci de m'avoir accueilli quand je ne connaissais personne",
      "Merci pour les cours de Bible qui éclairent ma lecture",
      "Merci pour le soutien scolaire offert aux enfants du quartier",
      "Merci pour ces amitiés nées sur les bancs de l'église",
      "Merci pour la confiance que vous m'avez accordée",
      "Merci à ceux qui entretiennent notre belle église",
      "Merci pour l'aumônerie qui accompagne nos lycéens",
      "Merci pour la Semaine Sainte vécue ensemble, si intense",
      "Merci pour votre patience et votre douceur",
      "Merci pour la joie communicative de cette paroisse",
      "Merci pour chaque sourire échangé sur le parvis"
    ];

    const HEART_PATH = 'M50,90 C45,82 0,58 0,32 C0,8 16,-2 34,5 C44,9 50,20 50,20 C50,20 56,9 66,5 C84,-2 100,8 100,32 C100,58 55,82 50,90Z';

    const colors = [
      '#e8697d', '#d4556a', '#c9707d', '#e07888',
      '#cf6275', '#b5596a', '#d98a95', '#c27483',
      '#e4818f', '#d16b7a', '#c4848e', '#d99aa3',
      '#cc6677', '#e09099', '#c07080'
    ];

    const grid = document.getElementById('grid');
    const randomBtn = document.getElementById('randomBtn');
    const zoomSlide = document.getElementById('zoomSlide');
    const zoomChevron = document.getElementById('zoomChevron');
    const cards = [];

    let currentOpen = null;
    let zoomMode = false;

    function heartSVG(color) {
      return `<svg viewBox="0 0 100 95" class="heart-svg"><path d="${HEART_PATH}" fill="${color}"/></svg>`;
    }

    // Mélange aléatoire des messages à chaque chargement
    for (let i = messages.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [messages[i], messages[j]] = [messages[j], messages[i]];
    }

    messages.forEach((msg, i) => {
      const color = colors[Math.floor(Math.random() * colors.length)];
      const rotation = (Math.random() * 24 - 12).toFixed(1);
      const sizeVariation = (0.88 + Math.random() * 0.24).toFixed(2);

      const card = document.createElement('div');
      card.className = 'heart-card';
      card.style.setProperty('--color', color);
      card.style.transform = `rotate(${rotation}deg) scale(${sizeVariation})`;

      card.innerHTML = `
    <div class="heart-inner">
      <div class="heart-front">
        ${heartSVG(color)}
      </div>
      <div class="heart-back">
        <div class="heart-back-wrap">
          ${heartSVG(color)}
          <div class="heart-back-text">${msg}</div>
        </div>
      </div>
    </div>
  `;

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleCard(card);
      });

      grid.appendChild(card);
      cards.push(card);
    });

    function toggleCard(card) {
      const cls = zoomMode ? 'zoomed' : 'flipped';
      const otherCls = zoomMode ? 'flipped' : 'zoomed';

      if (currentOpen && currentOpen !== card) {
        const prev = currentOpen;
        setTimeout(() => {
          prev.classList.remove('flipped');
          prev.classList.remove('zoomed');
        }, 300);
      }

      // Remove the other mode's class if present
      card.classList.remove(otherCls);
      card.classList.toggle(cls);
      currentOpen = card.classList.contains(cls) ? card : null;
    }

    function closeCurrentCard() {
      if (currentOpen) {
        currentOpen.classList.remove('flipped');
        currentOpen.classList.remove('zoomed');
        currentOpen = null;
      }
    }

    document.addEventListener('click', () => {
      closeCurrentCard();
    });

    // Zoom slide button
    zoomSlide.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = zoomSlide.classList.contains('open');

      if (!isOpen) {
        // Slide out
        zoomSlide.classList.add('open');
        zoomChevron.innerHTML = '&lsaquo;';
      } else {
        // Toggle zoom mode
        zoomMode = !zoomMode;
        zoomSlide.classList.toggle('active', zoomMode);
        closeCurrentCard();
      }
    });

    // Click chevron to collapse when open
    zoomChevron.addEventListener('click', (e) => {
      if (zoomSlide.classList.contains('open')) {
        e.stopPropagation();
        zoomSlide.classList.remove('open');
        zoomChevron.innerHTML = '&rsaquo;';
      }
    });

    randomBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeCurrentCard();
      const card = cards[Math.floor(Math.random() * cards.length)];

      card.scrollIntoView({ behavior: 'smooth', block: 'center' });

      card.classList.add('pulse');
      setTimeout(() => {
        card.classList.remove('pulse');
        toggleCard(card);
      }, 850);
    });
  </script>

</body>

</html>
